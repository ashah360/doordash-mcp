query promoStickyFooter($consumerId: ID!, $cartId: ID, $storeId: ID, $submarketId: ID, $menuId: ID, $subtotal: Int, $currency: String, $isDYFCart: Boolean, $cartStatusType: CartStatusType, $landingPageType: PromoLandingPageTypeMap, $micStickyFooterState: MICStickyFooterState) {
  promoStickyFooter(
    consumerId: $consumerId
    cartId: $cartId
    storeId: $storeId
    submarketId: $submarketId
    menuId: $menuId
    subtotal: $subtotal
    currency: $currency
    isDYFCart: $isDYFCart
    cartStatusType: $cartStatusType
    landingPageType: $landingPageType
    micStickyFooterState: $micStickyFooterState
  ) {
    copy
    cartSubtotal
    promotionMinSubtotal
    campaignId
    leadingIcon
    actionUrl
    promoSubmessage
    loyaltyProgressOnScale1
    useCase
    metadata {
      segmentsCount
      progressBarValue
      stickyFooterState
      __typename
    }
    __typename
  }
}
