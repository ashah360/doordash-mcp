query storepageFeed($storeId: ID!, $isMerchantPreview: Boolean) {
  storepageFeed(storeId: $storeId, isMerchantPreview: $isMerchantPreview) {
    storeHeader {
      id
      name
      description
      isConvenience
      priceRangeDisplayString
      asapMinutes
      ratings {
        averageRating
        numRatingsDisplayString
      }
      address {
        printableAddress
        street
        lat
        lng
      }
      coverImgUrl
      offersDelivery
      offersPickup
    }
    menuBook {
      id
    }
    itemLists {
      id
      name
      items {
        id
        name
        description
        displayPrice
        imgUrl
        quickAddContext {
          isEligible
          price {
            unitAmount
          }
          nestedOptions
        }
      }
    }
  }
}
